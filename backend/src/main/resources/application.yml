spring:
  application:
    name: sumika
  # ローカル開発のデフォルトは docker-compose の PostgreSQL（環境変数で上書き可）
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/sumika}
    username: ${SPRING_DATASOURCE_USERNAME:sumika}
    password: ${SPRING_DATASOURCE_PASSWORD:sumika}
  jpa:
    # スキーマは Flyway で管理し、Hibernate は検証のみ行う
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak realm の issuer。既定はローカル docker-compose の Keycloak。
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8081/realms/sumika}
  mvc:
    # 標準例外も RFC 7807 (ProblemDetail) で返す
    problemdetails:
      enabled: true
