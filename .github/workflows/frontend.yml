name: frontend

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

defaults:
  run:
    working-directory: frontend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # 開発環境に合わせ npm 11 を使用（Node 22 同梱の npm 10 は npm 11 製 lock の
      # wasm-runtime 系 optional 依存を欠落扱いして npm ci が失敗するため）
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # テストは #20 で追加予定。スクリプトが存在する場合のみ実行する。
      - run: npm test --if-present
