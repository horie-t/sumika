name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # 変更領域を検出（パスフィルタを各ジョブの実行条件に使う）
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # 開発環境に合わせ npm 11 を使用（Node 22 同梱は npm 10）
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test --if-present

  # 常に実行される唯一の必須チェック。backend/frontend が success または skipped なら成功。
  ci-success:
    needs: [backend, frontend]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "backend=${{ needs.backend.result }} frontend=${{ needs.frontend.result }}"
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.backend.result }}" == "cancelled" ]]; then
            echo "backend job failed"; exit 1
          fi
          if [[ "${{ needs.frontend.result }}" == "failure" || "${{ needs.frontend.result }}" == "cancelled" ]]; then
            echo "frontend job failed"; exit 1
          fi
          echo "all required jobs passed (or were skipped)"
