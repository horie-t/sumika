name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # 変更領域を検出（パスフィルタを各ジョブの実行条件に使う）
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew build

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # 開発環境に合わせ npm 11 を使用（Node 22 同梱は npm 10）
      - run: npm install -g npm@11
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test --if-present

  # ブラウザ E2E（Playwright + playwright-bdd）。フルスタック（Postgres + backend + frontend）を起動して実行。
  # フロント・バックエンドのどちらの変更でも実行する。
  e2e:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
      # Postgres と Keycloak（realm はコミット済み JSON をインポート）を docker compose で起動。
      - name: Start Postgres and Keycloak
        run: docker compose up -d db keycloak
      - name: Wait for Postgres and Keycloak
        run: |
          npx --yes wait-on -t 120000 tcp:127.0.0.1:5432
          npx --yes wait-on -t 180000 http://localhost:8081/realms/sumika/.well-known/openid-configuration
      # backend を起動（datasource 既定 localhost:5432、issuer-uri 既定 localhost:8081 と一致するため上書き不要）。
      - name: Start backend
        working-directory: backend
        run: ./gradlew bootRun > backend.log 2>&1 &
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install -g npm@11
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Wait for backend
        run: npx --yes wait-on -t 180000 http://localhost:8080/v3/api-docs
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: frontend
        run: npm run e2e
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7

  # 常に実行される唯一の必須チェック。backend/frontend/e2e が success または skipped なら成功。
  ci-success:
    needs: [backend, frontend, e2e]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "backend=${{ needs.backend.result }} frontend=${{ needs.frontend.result }} e2e=${{ needs.e2e.result }}"
          if [[ "${{ needs.backend.result }}" == "failure" || "${{ needs.backend.result }}" == "cancelled" ]]; then
            echo "backend job failed"; exit 1
          fi
          if [[ "${{ needs.frontend.result }}" == "failure" || "${{ needs.frontend.result }}" == "cancelled" ]]; then
            echo "frontend job failed"; exit 1
          fi
          if [[ "${{ needs.e2e.result }}" == "failure" || "${{ needs.e2e.result }}" == "cancelled" ]]; then
            echo "e2e job failed"; exit 1
          fi
          echo "all required jobs passed (or were skipped)"
